name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (core)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install package (fast extra; numpy chunk-map decode path)
        run: pip install -e '.[fast]'

      - name: Install pytest
        run: pip install pytest

      - name: Import smoke check
        run: python -c "import tibread; print(tibread.__version__)"

      - name: Run unit tests
        # Only the synthetic-input tests are runnable in CI.  The
        # `tools/tests/extract_magic_check.py` script needs real `.tib`
        # files and is intentionally excluded.
        run: pytest tools/tests/test_compression.py -v
